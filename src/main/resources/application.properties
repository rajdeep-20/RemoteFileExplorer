spring.application.name=RemoteFileExplorer

# MongoDB - credentials are injected via environment variables or application-local.properties
# See application-local.properties.template for setup instructions
spring.data.mongodb.uri=${MONGO_URI}

# Load local overrides (gitignored) — won't fail if file is absent
spring.config.import=optional:classpath:application-local.properties
server.port=${PORT:8354}
server.address=0.0.0.0

# Multipart config to allow large file uploads from Android app
spring.servlet.multipart.max-file-size=1000MB
spring.servlet.multipart.max-request-size=1000MB